name: Build LLVM ARM64

on:
  workflow_dispatch:
  push:
    tags: ['arm64-*']

permissions:
  contents: read

jobs:
  build-llvm:
    name: Build LLVM
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: true
      - name: Build
        run: |
          sudo rm -rf /opt/clang-cross
          ./scripts/make_canadian_clang aarch64-unknown-linux-gnu llvm
      - name: Upload package
        uses: actions/upload-artifact@v7
        with:
          name: clang-cross
          path: clang-cross.tar.xz
          if-no-files-found: error
          retention-days: 1
